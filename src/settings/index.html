<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';">
  <title data-i18n="settings.title">claudeState 설정</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container">
    <h1 data-i18n="settings.header">claudeState 설정</h1>

    <div class="field">
      <label for="orgId" data-i18n="settings.orgIdLabel">Organization ID</label>
      <input type="text" id="orgId" data-i18n-placeholder="settings.orgIdPlaceholder" />
      <p class="hint" data-i18n-html="settings.orgIdHint"></p>
    </div>

    <div class="field">
      <label for="sessionCookie" data-i18n="settings.cookieLabel">Session Cookie (sessionKey)</label>
      <textarea id="sessionCookie" rows="3" data-i18n-placeholder="settings.cookiePlaceholder"></textarea>
      <p class="hint" data-i18n-html="settings.cookieHint"></p>
    </div>

    <div class="field">
      <label for="refreshInterval" data-i18n="settings.intervalLabel">새로고침 간격 (초)</label>
      <input type="number" id="refreshInterval" min="10" max="3600" step="10" value="300" />
      <p class="hint" data-i18n="settings.intervalHint"></p>
    </div>

    <div class="field">
      <label for="language" data-i18n="settings.languageLabel">언어 (Language)</label>
      <select id="language">
        <option value="ko">한국어</option>
        <option value="en">English</option>
      </select>
    </div>

    <div class="field">
      <label for="opacity" data-i18n="settings.opacityLabel">위젯 투명도</label>
      <div class="slider-row">
        <input type="range" id="opacity" min="30" max="100" step="5" value="100" />
        <span class="opacity-value" id="opacity-value">100%</span>
      </div>
      <p class="hint" data-i18n="settings.opacityHint"></p>
    </div>

    <div class="field checkbox-field">
      <label class="checkbox-label">
        <input type="checkbox" id="autoLaunch" />
        <span data-i18n="settings.autoLaunch">Windows 시작 시 자동 실행</span>
      </label>
    </div>

    <div class="status" id="status"></div>

    <div class="actions">
      <button id="test-btn" class="secondary" data-i18n="settings.testBtn">지금 새로고침</button>
      <button id="save-btn" class="primary" data-i18n="settings.saveBtn">저장</button>
    </div>

    <div class="section-divider"></div>

    <h2 class="section-header" data-i18n="settings.telegramHeader">텔레그램 알림</h2>

    <div class="field">
      <label for="telegramToken" data-i18n="settings.telegramTokenLabel">Bot Token</label>
      <input type="text" id="telegramToken" data-i18n-placeholder="settings.telegramTokenPlaceholder" autocomplete="off" />
      <p class="hint" data-i18n="settings.telegramTokenHint"></p>
    </div>

    <div class="field telegram-status-row">
      <span id="telegram-status" class="telegram-status" data-i18n="settings.telegramNotLinked">연결 안 됨</span>
      <button id="telegram-link-btn" class="secondary small" data-i18n="settings.telegramLinkBtn">내 텔레그램과 연결</button>
      <button id="telegram-test-btn" class="secondary small" data-i18n="settings.telegramTestBtn" disabled>테스트</button>
    </div>

    <p class="note" data-i18n="settings.note"></p>
  </div>
  <script src="settings.js"></script>
</body>
</html>
